<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Deep navy background -->
  <rect width="32" height="32" rx="6" fill="#0A1628"/>

  <!-- Brain outline - minimalist geometric, teal/cyan stroke -->
  <!-- Left hemisphere -->
  <path d="
    M16 8
    C16 8 13 8 11 9.5
    C9 11 8.5 13 8.5 14.5
    C8.5 16 9 17 8.5 18
    C8 19 7.5 19.5 8 21
    C8.5 22.5 10 23.5 12 24
    L16 24
  " fill="none" stroke="#2DD4BF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right hemisphere -->
  <path d="
    M16 8
    C16 8 19 8 21 9.5
    C23 11 23.5 13 23.5 14.5
    C23.5 16 23 17 23.5 18
    C24 19 24.5 19.5 24 21
    C23.5 22.5 22 23.5 20 24
    L16 24
  " fill="none" stroke="#2DD4BF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center divider -->
  <line x1="16" y1="9" x2="16" y2="24" stroke="#2DD4BF" stroke-width="0.8" stroke-dasharray="1.5,1.5" opacity="0.5"/>

  <!-- Network nodes inside brain -->
  <!-- Node 1 - left upper -->
  <circle cx="12" cy="13" r="1" fill="#2DD4BF"/>
  <!-- Node 2 - left lower -->
  <circle cx="11.5" cy="19" r="1" fill="#2DD4BF"/>
  <!-- Node 3 - right upper -->
  <circle cx="20" cy="13" r="1" fill="#2DD4BF"/>
  <!-- Node 4 - right lower -->
  <circle cx="20.5" cy="19" r="1" fill="#2DD4BF"/>
  <!-- Node 5 - center -->
  <circle cx="16" cy="16" r="1.2" fill="#2DD4BF"/>

  <!-- Connections between nodes -->
  <line x1="12" y1="13" x2="16" y2="16" stroke="#2DD4BF" stroke-width="0.8" opacity="0.7"/>
  <line x1="20" y1="13" x2="16" y2="16" stroke="#2DD4BF" stroke-width="0.8" opacity="0.7"/>
  <line x1="11.5" y1="19" x2="16" y2="16" stroke="#2DD4BF" stroke-width="0.8" opacity="0.7"/>
  <line x1="20.5" y1="19" x2="16" y2="16" stroke="#2DD4BF" stroke-width="0.8" opacity="0.7"/>
  <line x1="12" y1="13" x2="11.5" y2="19" stroke="#2DD4BF" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="13" x2="20.5" y2="19" stroke="#2DD4BF" stroke-width="0.6" opacity="0.4"/>
</svg>
